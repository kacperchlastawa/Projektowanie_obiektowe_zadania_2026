name: CI/CD Pipeline (Zadanie 10)

on:
  push:
    branches:
      - main
    paths:
      - 'Zadanie5/**'
      - '.github/workflows/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kacperchlastawa/projektowanie_obiektowe_zadania_2026

jobs:
  build:
    name: Build Docker Images (Punkt 3.5)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Zadanie5/server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Zadanie5
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest

      - name: Send email notification on build success (Punkt 4.0)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Github Actions - Obrazy zbudowane pomyślnie
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions
          body: Obrazy aplikacji z Zadania 5 zostały poprawnie zbudowane i wysłane do GHCR!
